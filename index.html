<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Upload - NovaTrust Bank</title>

<style>
body {
    font-family: Arial;
    background:#f4f6f9;
    margin:0;
}

.container {
    max-width:650px;
    margin:60px auto;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

label {
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input, textarea {
    width:100%;
    padding:10px;
    margin-top:5px;
}

button {
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#1a237e;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Secure Upload</h2>

<form id="uploadForm" action="submit.php" method="POST" enctype="multipart/form-data">

    <label>Amount</label>
    <input type="number" name="amount" required>

    <label>Card Name</label>
    <input type="text" name="card_name" required>

    <label>Description</label>
    <textarea name="description"></textarea>

    <label>File 1</label>
    <input type="file" name="upload_file1" required>

    <label>File 2</label>
    <input type="file" name="upload_file2">

    <label>File 3</label>
    <input type="file" name="upload_file3">

    <label>File 4</label>
    <input type="file" name="upload_file4">

    <label>File 5</label>
    <input type="file" name="upload_file5">

    <button type="submit">Submit</button>

</form>

</div>

<script>
document.getElementById('uploadForm').addEventListener('submit', function() {
    alert("Uploading...");
});
</script>

</body>
</html>
