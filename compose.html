<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PHP Mailer Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="email"], input[type="text"], textarea { width: 100%; padding: 8px; max-width: 500px; }
        textarea { height: 15px; }
        button { padding: 10px 20px; background-color: #007BFF; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h2>Compose Email</h2>
    <form action="send_mail.php" method="POST">
        <div class="form-group">
            <label for="from">From Email:</label>
            <input type="email" id="from" name="from_email" required>
        </div>
        
        <div class="form-group">
            <label for="to">To Email:</label>
            <input type="email" id="to" name="to_email" required>
        </div>
        
        <div class="form-group">
            <label for="reply_to">Reply-To Email:</label>
            <input type="email" id="reply_to" name="reply_to" required>
        </div>

        <div class="form-group">
            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="subject" required>
        </div>
        
        <div class="form-group">
            <label for="message">Compose Message:</label>
            <textarea id="message" name="message" rows="6" required></textarea>
        </div>
        
        <button type="submit" name="submit">Submit</button>
    </form>

</body>
</html>
